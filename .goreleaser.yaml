version: 2

project_name: crtui

archives:
  - id: default
    formats:
      - tar.gz
    format_overrides:
      - goos: windows
        formats:
          - zip
    files:
      - LICENSE

nfpms:
  - id: default
    formats:
      - deb
      - rpm
    vendor: crtui
    homepage: https://github.com/ksckaan1/crtui
    maintainer: Kaan Kuscu
    description: Terminal-based container registry management tool
    license: MIT

brews:
  - name: crtui
    repository:
      owner: ksckaan1
      name: homebrew-tap

aurs:
  - name: crtui-bin
    ids:
      - crtui
    git_url: "ssh://aur@aur.archlinux.org/crtui-bin.git"
    arch:
      - amd64
      - arm64

checksum:
  name_template: "checksums.txt"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"

release:
  github:
    owner: ksckaan1
    name: crtui
  draft: true
  prerelease: auto

builds:
  - id: crtui
    main: ./cmd/crtui
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    binary: crtui
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w
      - -X github.com/ksckaan1/crtui/version.Version=v{{.Version}}
