name: Upload Release Assets to Cloudsmith

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: 'Release Tag to download (Leave empty for "latest")'
        required: false
        default: "latest"

jobs:
  upload:
    name: Cloudsmith Asset Upload
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Install Cloudsmith CLI
        run: pip install --quiet cloudsmith-cli

      - name: Download Release Assets
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          mkdir -p dist
          if [ "${{ github.event.inputs.release_tag }}" == "latest" ]; then
            gh release download --repo ${{ github.repository }} --dir dist --pattern '*'
          else
            gh release download ${{ github.event.inputs.release_tag }} --repo ${{ github.repository }} --dir dist --pattern '*'
          fi

      - name: Make Script Executable
        run: chmod +x scripts/upload_cloudsmith.sh

      - name: Run Cloudsmith Upload Script
        env:
          CLOUDSMITH_API_KEY: ${{ secrets.CLOUDSMITH_API_KEY }}
          RELEASE_ASSETS_DIR: ./dist
        run: |
          # We export it here just to be 100% sure the sub-shell picks it up
          export CLOUDSMITH_API_KEY="${{ secrets.CLOUDSMITH_API_KEY }}"
          ./scripts/upload_cloudsmith.sh
