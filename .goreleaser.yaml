version: 2

project_name: crtui

archives:
  - id: default
    formats: [tar.gz]
    format_overrides:
      - goos: windows
        formats: [zip]
    files:
      - LICENSE

nfpms:
  - id: default
    formats: [deb, rpm, apk]
    vendor: crtui
    homepage: https://github.com/ksckaan1/crtui
    maintainer: Kaan Kuscu
    description: Terminal-based container registry management tool
    license: MIT

checksum:
  name_template: "checksums.txt"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"

release:
  github:
    owner: ksckaan1
    name: crtui
  draft: false
  prerelease: auto

builds:
  - main: ./cmd/crtui
    binary: crtui
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w
      - -X github.com/ksckaan1/crtui/version.Version={{.Version}}
