name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      snapshot:
        description: 'Run as snapshot build'
        required: false
        default: 'false'
        type: boolean

permissions:
  contents: write

jobs:
  goreleaser:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26'

      - name: Run GoReleaser
        if: github.event_name != 'workflow_dispatch'
        uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: '~> v2'
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          AUR_SSH_KEY: ${{ secrets.AUR_SSH_KEY }}

      - name: Upload to Cloudsmith
        if: github.event_name != 'workflow_dispatch' && env.CLOUDSMITH_TOKEN != ''
        run: |
          pip install --quiet cloudsmith-cli
          ORG="ksckaan1"
          REPO="crtui"
          for deb in dist/*.deb; do
            [ -f "$deb" ] && cloudsmith push deb "$ORG/$REPO/ubuntu/any-version" "$deb" --no-wait-for-sync || true
          done
          for rpm in dist/*.rpm; do
            [ -f "$rpm" ] && cloudsmith push rpm "$ORG/$REPO/any-distro/any-version" "$rpm" --no-wait-for-sync || true
          done
          for apk in dist/*.apk; do
            [ -f "$apk" ] && cloudsmith push alpine "$ORG/$REPO/alpine/edge" "$apk" --no-wait-for-sync || true
          done
        env:
          CLOUDSMITH_TOKEN: ${{ secrets.CLOUDSMITH_TOKEN }}

      - name: Run GoReleaser (Snapshot)
        if: github.event_name == 'workflow_dispatch'
        uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: '~> v2'
          args: release --snapshot --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          AUR_SSH_KEY: ${{ secrets.AUR_SSH_KEY }}

      - name: Upload to Cloudsmith (Snapshot)
        if: github.event_name == 'workflow_dispatch' && env.CLOUDSMITH_TOKEN != ''
        run: |
          pip install --quiet cloudsmith-cli
          ORG="ksckaan1"
          REPO="crtui"
          for deb in dist/*.deb; do
            [ -f "$deb" ] && cloudsmith push deb "$ORG/$REPO/ubuntu/any-version" "$deb" --no-wait-for-sync || true
          done
          for rpm in dist/*.rpm; do
            [ -f "$rpm" ] && cloudsmith push rpm "$ORG/$REPO/any-distro/any-version" "$rpm" --no-wait-for-sync || true
          done
          for apk in dist/*.apk; do
            [ -f "$apk" ] && cloudsmith push alpine "$ORG/$REPO/alpine/edge" "$apk" --no-wait-for-sync || true
          done
        env:
          CLOUDSMITH_TOKEN: ${{ secrets.CLOUDSMITH_TOKEN }}
